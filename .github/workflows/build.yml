name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          cache-disabled: true

      - name: Build debug APK
        id: build
        shell: bash
        continue-on-error: true
        run: |
          set +e
          gradle assembleDebug --no-daemon 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: innovation-pdftoolkit-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish debug APK as a Release asset
        if: steps.build.outcome == 'success' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-${{ github.run_number }}
          name: Debug build ${{ github.run_number }}
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
          body: Automated debug APK from commit ${{ github.sha }}

      - name: Publish build log as a Release asset (on failure)
        if: steps.build.outcome == 'failure'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-log-${{ github.run_number }}
          name: Build FAILED — log ${{ github.run_number }}
          prerelease: true
          files: build_log.txt
          body: Automated failure log from commit ${{ github.sha }}

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
